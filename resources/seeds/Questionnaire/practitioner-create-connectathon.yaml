resourceType: Questionnaire
id: practitioner-create-connectathon
name: practitioner-create-connectathon
title: "Practitioner create PH"
status: active
url: practitioner-create
subjectType:
  - Practitioner
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
mapping:
  - reference: Mapping/practitioner-create-connectathon
launchContext:
  - name:
      code: Practitioner
    type:
      - Practitioner
item:
  - linkId: practitionerId
    text: PractitionerId
    type: string
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Practitioner.id"

  - linkId: first-name
    text: "First name"
    type: string
    required: true
    initialExpression:
      language: text/fhirpath
      expression: "%Practitioner.name.given.first()"

  - linkId: middle-name
    text: "Middle name"
    type: string
    initialExpression:
      language: text/fhirpath
      expression: "%Practitioner.name.given[1]"

  - linkId: last-name
    text: "Last name"
    type: string
    required: true
    initialExpression:
      language: text/fhirpath
      expression: "%Practitioner.name.family"

  - linkId: gender
    text: Gender
    type: choice
    required: true
    answerOption:
      - valueCoding:
          system: "http://hl7.org/fhir/administrative-gender"
          code: male
          display: Male
      - valueCoding:
          system: "http://hl7.org/fhir/administrative-gender"
          code: female
          display: Female
      - valueCoding:
          system: "http://hl7.org/fhir/administrative-gender"
          code: other
          display: Other
      - valueCoding:
          system: "http://hl7.org/fhir/administrative-gender"
          code: unknown
          display: Unknown
    initialExpression:
      language: text/fhirpath
      expression: |-
        %Questionnaire.repeat(item).where(linkId='gender').answerOption.valueCoding.where(code=%Practitioner.gender).first()

  - linkId: birth-date
    text: "Date of Birth"
    type: date
    required: true
    initialExpression:
      language: text/fhirpath
      expression: "%Practitioner.birthDate"

  - linkId: phone
    text: Phone
    type: string
    regex: ^\+63(?:[\s.-]?9\d{2}[\s.-]?\d{3}[\s.-]?\d{4}|9\d{9})$
    itemControl:
      coding:
        - code: phoneWidget
    initialExpression:
      language: text/fhirpath
      expression: "%Practitioner.telecom.where(system='phone').value.first()"

  - linkId: email
    text: Email
    type: string
    initialExpression:
      language: text/fhirpath
      expression: "%Practitioner.telecom.where(system='email').value.first()"

  - linkId: communication-language
    text: Language
    type: choice
    repeats: true
    # TODO: uncomment answerValueSet when tx.fhirlab.net expands languages
    # answerValueSet: http://hl7.org/fhir/ValueSet/languages
    answerOption:
      - valueCoding:
          system: "urn:ietf:bcp:47"
          code: en
          display: English
      - valueCoding:
          system: "urn:ietf:bcp:47"
          code: fil
          display: Filipino
    initialExpression:
      language: text/fhirpath
      expression: |-
        %Questionnaire.repeat(item).where(linkId='communication-language').answerOption.valueCoding.where(code in %Practitioner.communication.coding.code)

  - linkId: address-group
    text: Address
    type: group
    repeats: true
    itemPopulationContext:
      language: text/fhirpath
      expression: "%Practitioner.address"
      name: address
    item:
      - linkId: address-use
        text: "Address use"
        type: choice
        answerOption:
          - valueCoding:
              system: "http://hl7.org/fhir/address-use"
              code: home
              display: Home
          - valueCoding:
              system: "http://hl7.org/fhir/address-use"
              code: work
              display: Work
          - valueCoding:
              system: "http://hl7.org/fhir/address-use"
              code: temp
              display: Temporary
          - valueCoding:
              system: "http://hl7.org/fhir/address-use"
              code: old
              display: "Old / Incorrect"
          - valueCoding:
              system: "http://hl7.org/fhir/address-use"
              code: billing
              display: Billing
        initialExpression:
          language: text/fhirpath
          expression: |-
            %Questionnaire.repeat(item).where(linkId='address-use').answerOption.valueCoding.where(code=%context.use).first()

      - linkId: address-line
        text: "Address Line"
        type: string
        initialExpression:
          language: text/fhirpath
          expression: "%context.line.first()"

      - linkId: address-region
        text: Region
        type: choice
        # TODO: uncomment answerValueSet when tx.fhirlab.net expands regions
        # answerValueSet: https://fhir.doh.gov.ph/phcore/ValueSet/regions
        answerOption:
          - valueCoding:
              system: "https://psa.gov.ph/classification/psgc"
              code: "0102800000"
              display: "Ilocos Norte"
          - valueCoding:
              system: "https://psa.gov.ph/classification/psgc"
              code: "1300000000"
              display: "National Capital Region (NCR)"
        initialExpression:
          language: text/fhirpath
          expression: |-
            %context.extension('https://fhir.doh.gov.ph/phcore/StructureDefinition/region').valueCoding

      - linkId: address-province
        text: Province
        type: choice
        # TODO: uncomment answerValueSet when tx.fhirlab.net expands provinces
        # answerValueSet: https://fhir.doh.gov.ph/phcore/ValueSet/provinces
        answerOption:
          - valueCoding:
              system: "https://psa.gov.ph/classification/psgc"
              code: "1705100000"
              display: "Occidental Mindoro"
          - valueCoding:
              system: "https://psa.gov.ph/classification/psgc"
              code: "0349000000"
              display: Pampanga
        initialExpression:
          language: text/fhirpath
          expression: |-
            %context.extension('https://fhir.doh.gov.ph/phcore/StructureDefinition/province').valueCoding

      - linkId: address-city-municipality
        text: "City Municipality"
        type: choice
        # TODO: uncomment answerValueSet when tx.fhirlab.net expands cities
        # answerValueSet: https://fhir.doh.gov.ph/phcore/ValueSet/cities
        answerOption:
          - valueCoding:
              system: "https://psa.gov.ph/classification/psgc"
              code: "1380100000"
              display: "City of Caloocan"
          - valueCoding:
              system: "https://psa.gov.ph/classification/psgc"
              code: "1380600000"
              display: "City of Manila"
        initialExpression:
          language: text/fhirpath
          expression: |-
            %context.extension('https://fhir.doh.gov.ph/phcore/StructureDefinition/city-municipality').valueCoding

      - linkId: address-barangay
        text: Barangay
        type: choice
        # TODO: uncomment answerValueSet when tx.fhirlab.net expands barangays
        # answerValueSet: https://fhir.doh.gov.ph/phcore/ValueSet/barangays
        answerOption:
          - valueCoding:
              system: "https://psa.gov.ph/classification/psgc"
              code: "1380100001"
              display: "Barangay 1, City of Caloocan"
          - valueCoding:
              system: "https://psa.gov.ph/classification/psgc"
              code: "1380603000"
              display: "Quiapo, City of Manila"
        initialExpression:
          language: text/fhirpath
          expression: |-
            %context.extension('https://fhir.doh.gov.ph/phcore/StructureDefinition/barangay').valueCoding

      - linkId: address-city
        text: City
        type: string
        initialExpression:
          language: text/fhirpath
          expression: "%context.city"

      - linkId: address-district
        text: District
        type: string
        initialExpression:
          language: text/fhirpath
          expression: "%context.district"

      - linkId: address-postal-code
        text: "Postal Code"
        type: string
        initialExpression:
          language: text/fhirpath
          expression: "%context.postalCode"

      - linkId: address-country
        text: Country
        type: choice
        # TODO: uncomment answerValueSet when tx.fhirlab.net expands iso3166-1-2
        # answerValueSet: http://hl7.org/fhir/ValueSet/iso3166-1-2
        answerOption:
          - valueCoding:
              system: urn:iso:std:iso:3166
              code: "PH"
              display: Philippines
          - valueCoding:
              system: urn:iso:std:iso:3166
              code: "US"
              display: "United States of America"
        initialExpression:
          language: text/fhirpath
          expression: |-
            %Questionnaire.repeat(item).where(linkId='address-country').answerOption.valueCoding.where(code=(%context.country | 'PH')).first()
