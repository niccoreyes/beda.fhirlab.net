meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
name: encounter-create-connectathon
item:
  - text: EncounterId
    type: string
    linkId: encounterId
    extension:
      - url: http://hl7.org/fhir/StructureDefinition/questionnaire-hidden
        valueBoolean: true
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Encounter.id'
  - text: Encounter identifier
    type: string
    linkId: encounter-identifier
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Encounter.identifier.value.first()'
  - text: Patient
    type: reference
    linkId: patient
    required: true
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-choiceColumn
        extension:
          - url: path
            valueString: >-
              name.given.first() + ' ' + name.family.first()
          - url: forDisplay
            valueBoolean: true
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-answerExpression
        valueExpression:
          language: application/x-fhir-query
          expression: Patient
      - url: >-
          http://hl7.org/fhir/StructureDefinition/questionnaire-referenceResource
        valueCode: Patient
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Encounter.subject'
  - text: Practitioner
    type: reference
    linkId: practitioner
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-choiceColumn
        extension:
          - url: path
            valueString: >-
              name.given.first() + ' ' + name.family
          - url: forDisplay
            valueBoolean: true
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-answerExpression
        valueExpression:
          language: application/x-fhir-query
          expression: Practitioner
      - url: >-
          http://hl7.org/fhir/StructureDefinition/questionnaire-referenceResource
        valueCode: Practitioner
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Encounter.participant.individual.first()'
  - text: Participant role
    type: choice
    linkId: participant-type
    answerOption:
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ParticipationType
          code: ADM
          display: admitter
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ParticipationType
          code: ATND
          display: attender
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ParticipationType
          code: CALLBCK
          display: callback contact
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ParticipationType
          code: CON
          display: consultant
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ParticipationType
          code: DIS
          display: discharger
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ParticipationType
          code: ESC
          display: escort
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ParticipationType
          code: REF
          display: referrer
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/participant-type
          code: translator
          display: Translator
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/participant-type
          code: emergency
          display: Emergency
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: >-
            %Questionnaire.repeat(item).where(linkId='participant-type').answerOption.valueCoding.where(code=%Encounter.participant.type.coding.first().code).first()
  - text: Organization
    type: reference
    linkId: organization
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-choiceColumn
        extension:
          - url: path
            valueString: name
          - url: forDisplay
            valueBoolean: true
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-answerExpression
        valueExpression:
          language: application/x-fhir-query
          expression: Organization
      - url: >-
          http://hl7.org/fhir/StructureDefinition/questionnaire-referenceResource
        valueCode: Organization
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Encounter.serviceProvider'
  - text: Status
    type: choice
    linkId: status
    required: true
    answerOption:
      - valueCoding:
          system: http://hl7.org/fhir/encounter-status
          code: planned
          display: Planned
      - valueCoding:
          system: http://hl7.org/fhir/encounter-status
          code: arrived
          display: Arrived
      - valueCoding:
          system: http://hl7.org/fhir/encounter-status
          code: triaged
          display: Triaged
      - valueCoding:
          system: http://hl7.org/fhir/encounter-status
          code: in-progress
          display: In Progress
      - valueCoding:
          system: http://hl7.org/fhir/encounter-status
          code: onleave
          display: On Leave
      - valueCoding:
          system: http://hl7.org/fhir/encounter-status
          code: finished
          display: Finished
      - valueCoding:
          system: http://hl7.org/fhir/encounter-status
          code: cancelled
          display: Cancelled
      - valueCoding:
          system: http://hl7.org/fhir/encounter-status
          code: entered-in-error
          display: Entered in Error
      - valueCoding:
          system: http://hl7.org/fhir/encounter-status
          code: unknown
          display: Unknown
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: >-
            %Questionnaire.repeat(item).where(linkId='status').answerOption.valueCoding.where(code=%Encounter.status).first()
  - text: Class
    type: choice
    linkId: class
    required: true
    answerOption:
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActCode
          code: AMB
          display: ambulatory
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActCode
          code: EMER
          display: emergency
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActCode
          code: FLD
          display: field
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActCode
          code: HH
          display: home health
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActCode
          code: ACUTE
          display: inpatient acute
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActCode
          code: IMP
          display: inpatient encounter
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActCode
          code: NONAC
          display: inpatient non-acute
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActCode
          code: OBSENC
          display: observation encounter
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActCode
          code: PRENC
          display: pre-admission
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActCode
          code: SS
          display: short stay
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActCode
          code: VR
          display: virtual
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: >-
            %Questionnaire.repeat(item).where(linkId='class').answerOption.valueCoding.where(code=%Encounter.class.code).first()
  - text: Encounter type
    type: choice
    linkId: encounter-type
    repeats: true
    answerValueSet: http://hl7.org/fhir/ValueSet/encounter-type
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Encounter.type.coding'
  - text: Service type
    type: choice
    linkId: service-type
    answerValueSet: http://hl7.org/fhir/ValueSet/service-type
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Encounter.serviceType.coding.first()'
  - text: Priority
    type: choice
    linkId: priority
    answerOption:
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: PRN
          display: as needed
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: A
          display: ASAP
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: CS
          display: callback for scheduling
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: CSP
          display: callback placer for scheduling
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: CR
          display: callback results
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: CSR
          display: contact recipient for scheduling
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: EL
          display: elective
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: EM
          display: emergency
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: P
          display: preop
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: R
          display: routine
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: RR
          display: rush reporting
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: S
          display: stat
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: T
          display: timing critical
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: UR
          display: urgent
      - valueCoding:
          system: http://terminology.hl7.org/CodeSystem/v3-ActPriority
          code: UD
          display: use as directed
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: >-
            %Questionnaire.repeat(item).where(linkId='priority').answerOption.valueCoding.where(code=%Encounter.priority.coding.first().code).first()
  - text: Reason for visit
    type: choice
    linkId: reason-code
    repeats: true
    answerValueSet: http://hl7.org/fhir/ValueSet/encounter-reason
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Encounter.reasonCode.coding'
  - text: Start
    type: dateTime
    linkId: period-start
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: iif(%Encounter.period.start.exists(), %Encounter.period.start, now())
  - text: End
    type: dateTime
    linkId: period-end
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Encounter.period.end'
resourceType: Questionnaire
title: Encounter create PH
extension:
  - url: https://emr-core.beda.software/StructureDefinition/questionnaire-mapper
    valueReference:
      reference: Mapping/encounter-create-extract-connectathon
  - url: http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-launchContext
    extension:
      - url: name
        valueCoding:
          code: Encounter
      - url: type
        valueCode: Encounter
status: active
id: encounter-create-connectathon
url: encounter-create
