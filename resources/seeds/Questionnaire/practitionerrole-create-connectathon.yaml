meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
name: practitionerrole-create-connectathon
item:
  - text: PractitionerRoleId
    type: string
    linkId: practitionerRoleId
    extension:
      - url: http://hl7.org/fhir/StructureDefinition/questionnaire-hidden
        valueBoolean: true
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%PractitionerRole.id'
  - text: Practitioner
    type: reference
    linkId: practitioner
    required: true
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-choiceColumn
        extension:
          - url: path
            valueString: >-
              name.given.first() + ' ' + name.family.first()
          - url: forDisplay
            valueBoolean: true
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-answerExpression
        valueExpression:
          language: application/x-fhir-query
          expression: Practitioner
      - url: >-
          http://hl7.org/fhir/StructureDefinition/questionnaire-referenceResource
        valueCode: Practitioner
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%PractitionerRole.practitioner'
  - text: Organization
    type: reference
    linkId: organization
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-choiceColumn
        extension:
          - url: path
            valueString: name
          - url: forDisplay
            valueBoolean: true
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-answerExpression
        valueExpression:
          language: application/x-fhir-query
          expression: Organization
      - url: >-
          http://hl7.org/fhir/StructureDefinition/questionnaire-referenceResource
        valueCode: Organization
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%PractitionerRole.organization'
  - text: Role
    type: choice
    linkId: code
    required: true
    answerValueSet: http://hl7.org/fhir/ValueSet/practitioner-role
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%PractitionerRole.code.coding.first()'
  - text: Specialty
    type: choice
    linkId: specialty
    repeats: true
    # TODO: uncomment answerValueSet when tx.fhirlab.net expands c80-practice-codes reliably
    # answerValueSet: http://hl7.org/fhir/ValueSet/c80-practice-codes
    answerOption:
      - valueCoding:
          system: http://snomed.info/sct
          code: "394583002"
          display: Endocrinology
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%PractitionerRole.specialty.coding'
  - text: Identifier
    type: string
    linkId: identifier-value
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%PractitionerRole.identifier.value.first()'
  - text: Phone
    type: string
    linkId: phone
    extension:
      - url: http://hl7.org/fhir/StructureDefinition/regex
        valueString: >-
          ^\s*(?:\+?(\d{1,3}))?[-. (]*(\d{3})[-. )]*(\d{3})[-. ]*(\d{4})(?:
          *x(\d+))?\s*$
      - url: http://hl7.org/fhir/StructureDefinition/questionnaire-itemControl
        valueCodeableConcept:
          coding:
            - code: phoneWidget
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: "%PractitionerRole.telecom.where(system='phone').value.first()"
  - text: Email
    type: string
    linkId: email
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: "%PractitionerRole.telecom.where(system='email').value.first()"
resourceType: Questionnaire
title: PractitionerRole create PH
extension:
  - url: https://emr-core.beda.software/StructureDefinition/questionnaire-mapper
    valueReference:
      reference: Mapping/practitionerrole-create-extract-connectathon
  - url: http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-launchContext
    extension:
      - url: name
        valueCoding:
          code: PractitionerRole
      - url: type
        valueCode: PractitionerRole
status: active
id: practitionerrole-create-connectathon
url: practitionerrole-create
