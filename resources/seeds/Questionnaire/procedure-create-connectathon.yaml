meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
name: procedure-create-connectathon
item:
  - text: ProcedureId
    type: string
    linkId: procedureId
    extension:
      - url: http://hl7.org/fhir/StructureDefinition/questionnaire-hidden
        valueBoolean: true
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Procedure.id'
  - text: Patient
    type: reference
    linkId: patient
    required: true
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-choiceColumn
        extension:
          - url: path
            valueString: >-
              name.given.first() + ' ' + name.family.first()
          - url: forDisplay
            valueBoolean: true
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-answerExpression
        valueExpression:
          language: application/x-fhir-query
          expression: Patient
      - url: >-
          http://hl7.org/fhir/StructureDefinition/questionnaire-referenceResource
        valueCode: Patient
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Procedure.subject'
  - text: Encounter
    type: reference
    linkId: encounter
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-choiceColumn
        extension:
          - url: path
            valueString: >-
              class.display + ' - ' + period.start.toString().split('.')[0].split('T')[0] + ' ' + period.start.toString().split('.')[0].split('T')[1]
          - url: forDisplay
            valueBoolean: true
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-answerExpression
        valueExpression:
          language: application/x-fhir-query
          expression: Encounter?patient={{%QuestionnaireResponse.repeat(item).where(linkId='patient').answer.valueReference.reference}}
      - url: >-
          http://hl7.org/fhir/StructureDefinition/questionnaire-referenceResource
        valueCode: Encounter
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Procedure.encounter'
  - text: Status
    type: choice
    linkId: status
    required: true
    answerOption:
      - valueCoding:
          system: http://hl7.org/fhir/event-status
          code: preparation
          display: Preparation
      - valueCoding:
          system: http://hl7.org/fhir/event-status
          code: in-progress
          display: In Progress
      - valueCoding:
          system: http://hl7.org/fhir/event-status
          code: not-done
          display: Not Done
      - valueCoding:
          system: http://hl7.org/fhir/event-status
          code: on-hold
          display: On Hold
      - valueCoding:
          system: http://hl7.org/fhir/event-status
          code: stopped
          display: Stopped
      - valueCoding:
          system: http://hl7.org/fhir/event-status
          code: completed
          display: Completed
      - valueCoding:
          system: http://hl7.org/fhir/event-status
          code: entered-in-error
          display: Entered in Error
      - valueCoding:
          system: http://hl7.org/fhir/event-status
          code: unknown
          display: Unknown
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: >-
            iif(%Procedure.status.exists(), %Questionnaire.repeat(item).where(linkId='status').answerOption.valueCoding.where(code=%Procedure.status).first(), %Questionnaire.repeat(item).where(linkId='status').answerOption.valueCoding.where(code='completed').first())
  - text: Category
    type: choice
    linkId: category
    answerValueSet: http://hl7.org/fhir/ValueSet/procedure-category
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Procedure.category.coding.first()'
  - text: Procedure Code
    type: choice
    linkId: code
    answerValueSet: http://hl7.org/fhir/ValueSet/procedure-code
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Procedure.code.coding.first()'
  - text: Performed date and time
    type: dateTime
    linkId: performed-date-time
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: >-
            iif(%Procedure.performedDateTime.exists(), %Procedure.performedDateTime, %Procedure.performedPeriod.start)
  - text: Body site
    type: choice
    linkId: body-site
    answerValueSet: http://hl7.org/fhir/ValueSet/body-site
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Procedure.bodySite.coding.first()'
  - text: Reason
    type: choice
    linkId: reason-code
    repeats: true
    answerValueSet: http://hl7.org/fhir/ValueSet/procedure-reason
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Procedure.reasonCode.coding'
  - text: Outcome
    type: choice
    linkId: outcome
    answerValueSet: http://hl7.org/fhir/ValueSet/procedure-outcome
    extension:
      - url: >-
          http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-initialExpression
        valueExpression:
          language: text/fhirpath
          expression: '%Procedure.outcome.coding.first()'
resourceType: Questionnaire
title: Procedure create PH
extension:
  - url: https://emr-core.beda.software/StructureDefinition/questionnaire-mapper
    valueReference:
      reference: Mapping/procedure-create-connectathon
  - url: http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-launchContext
    extension:
      - url: name
        valueCoding:
          code: Procedure
      - url: type
        valueCode: Procedure
status: active
id: procedure-create-connectathon
url: procedure-create
