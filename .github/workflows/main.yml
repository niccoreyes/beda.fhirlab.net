name: Build image and restart services
on:
  push:
    tags:
      - "v*.*.*"
jobs:
  Release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      DISABLE_ESLINT_PLUGIN: true
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Prepare config
        run: cp contrib/emr-config/config.production.js contrib/emr-config/config.js
      - name: Prepare index
        run: cp index.prod.html index.html
      - name: Install deps
        run: yarn install --network-concurrency 1
      - run: yarn extract
      - run: yarn compile
      - run: yarn build
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup Docker builder
        uses: docker/setup-buildx-action@v3
      - run: docker run --rm --privileged tonistiigi/binfmt --install all
      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract branch name
        shell: bash
        run: echo "branch=$(echo ${GITHUB_REF#refs/tags/v})" >>$GITHUB_OUTPUT
        id: extract_branch
      - name: Build and push the Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.extract_branch.outputs.branch }}
