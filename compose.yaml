services:
  sdc:
    image: bedasoftware/fhir-sdc:2.1.0a6
    depends_on:
      devbox:
        condition: service_healthy
    env_file:
      - ./env/sdc
  devbox:
    image: healthsamurai/aidboxone:stable
    depends_on:
      devbox-db:
        condition: service_healthy
      build-seeds:
        condition: service_completed_successfully
    healthcheck:
      test: curl --fail http://localhost:8080/health || exit 1
      interval: 5s
      timeout: 30s
      retries: 50
    ports:
      - 8080:8080
    env_file:
      - ./env/aidbox
    environment:
      - AIDBOX_LICENSE
    volumes:
      - ./resources/init-bundles:/resources/init-bundles
  devbox-db:
    image: "postgres:18"
    env_file:
      - ./env/db
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
  build-seeds:
    image: bedasoftware/fhirsnake:latest
    command:
      - export
      - --input
      - /app/resources/ig0
      - --input
      - /app/resources/ig1
      - --input
      - /app/resources/seeds
      - --output
      - /app/init-bundles/initBundle.json
      - --external-questionnaire-fce-fhir-converter-url
      - http://questionnaire-fce-fhir-converter:3000/to-fhir
    volumes:
      - ./resources/ig0:/app/resources/ig0:ro
      - ./resources/ig1:/app/resources/ig1:ro
      - ./resources/seeds:/app/resources/seeds:ro
      - ./resources/init-bundles:/app/init-bundles
    env_file:
      - ./env/build-seeds
  watch-seeds:
    image: bedasoftware/fhirsnake:latest
    command:
      - watch
      - --input
      - /app/resources/ig0
      - --input
      - /app/resources/ig1
      - --input
      - /app/resources/seeds
      - --external-fhir-server-url
      - http://root:secret@devbox:8080
      - --external-questionnaire-fce-fhir-converter-url
      - http://questionnaire-fce-fhir-converter:3000/to-fhir
    volumes:
      - ./resources/ig0:/app/resources/ig0:ro
      - ./resources/ig1:/app/resources/ig1:ro
      - ./resources/seeds:/app/resources/seeds:ro
    env_file:
      - ./env/build-seeds
  questionnaire-fce-fhir-converter:
    image: bedasoftware/questionnaire-fce-fhir-converter:latest
    healthcheck:
      test: curl --fail http://localhost:3000/health || exit 1
      interval: 5s
      timeout: 30s
      retries: 50
